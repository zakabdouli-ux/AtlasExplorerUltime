<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Leaflet</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
    }

    header {
      height: 80px;
      background: #111827;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      height: calc(100vh - 80px);
    }

    #map {
      flex: 2;
      height: 100%;
      min-height: 500px;
    }

    #sidebar {
      flex: 1;
      background: #020617;
      color: white;
      padding: 20px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <header>
    <h1>Atlas Explorer</h1>
  </header>

  <div class="container">
    <div id="map"></div>
    <aside id="sidebar">
      <h2>Infos</h2>
      <p>Test carte</p>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([31, 5], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    setTimeout(() => {
      map.invalidateSize();
    }, 200);
  </script>
</body>
</html>
