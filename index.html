<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte Interactive du Maghreb</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>Carte Interactive du Maghreb</h1>
    <p>Cliquez sur un pays pour découvrir ses plus belles villes et lieux touristiques 🌴</p>
  </header>

  <div id="container">
    <div id="map-container">
      <object id="map" data="maps/maghreb.svg" type="image/svg+xml"></object>
    </div>

    <div id="info-panel">
      <h2 id="country-name">Sélectionnez un pays</h2>
      <p id="country-description"></p>

      <h3>Villes principales</h3>
      <ul id="city-list"></ul>

      <h3>Galerie</h3>
      <div id="image-gallery"></div>
    </div>
  </div>

  <footer>© 2024 Carte du Maghreb · Fait avec ❤️ par [ton nom]</footer>
  <script src="script.js"></script>
</body>
</html>
